// ─── SG ENGINE ───────────────────────────────────────────────────────────────
function interp(table, dist) {
  var d = parseFloat(dist);
  if (isNaN(d) || d < 0) return null;
  if (d <= table[0][0]) return table[0][1];
  if (d >= table[table.length-1][0]) return table[table.length-1][1];
  for (var i=0; i<table.length-1; i++) {
    if (d >= table[i][0] && d <= table[i+1][0]) {
      var t = (d-table[i][0])/(table[i+1][0]-table[i][0]);
      return table[i][1] + t*(table[i+1][1]-table[i][1]);
    }
  }
  return null;
}
function getExp(lie, dist) { var t=SG_TABLES[lie]; return t?interp(t,dist):null; }

// FIX: par3 tee = approach; use holeLength for offTee baseline
function getSGCat(lie, dist, idx, par) {
  if (lie==="green") return "putting";
  if (lie==="tee" && idx===0 && par>=4) return "offTee";
  if (parseFloat(dist)<=50) return "aroundGreen";
  return "approach";
}

function calcSG(shots, par, holeLength) {
  return shots.map(function(s, i) {
    var startDist = s.distanceToHole;
    var startLie  = s.lie;
    // FIX: for first shot on par4/5, use holeLength for tee baseline if available
    if (i===0 && s.lie==="tee" && par>=4 && holeLength) startDist = holeLength;
    var se = getExp(startLie==="tee" && i===0 && par>=4 ? "tee" : startLie, startDist);
    if (se===null) return Object.assign({},s,{sg:null,sgCat:null});
    var ee;
    if (i < shots.length-1) {
      ee = getExp(shots[i+1].lie, shots[i+1].distanceToHole) || 0;
    } else {
      ee = 0; // last shot = holed
    }
    // Penalty modifier: each penalty stroke costs -1 extra SG
    // SG = (se - ee) - 1 (shot) - penaltyStrokes
    var penStrokes = s.penalty || 0;
    return Object.assign({},s,{
      sg: parseFloat((se - ee - 1 - penStrokes).toFixed(3)),
      sgCat: getSGCat(s.lie, s.distanceToHole, i, par)
    });
  });
}

function holeStats(hole) {
  var shots = hole.shots; var n = shots.length;
  if (!n) return null;
  // Add penalty strokes to total count
  var penaltyStrokes = shots.reduce(function(a,s){return a+(s.penalty||0);},0);
  n = n + penaltyStrokes;
  var par = hole.par; var hL = hole.holeLength||null;
  var firstGreen = shots.findIndex(function(s){return s.lie==="green";});
  // GIR: count strokes to reach green including penalty strokes
  var strokesToGreen = firstGreen>=0
    ? shots.slice(0,firstGreen).reduce(function(a,s){return a+1+(s.penalty||0);},0)
    : null;
  var gir = strokesToGreen!==null ? strokesToGreen<=par-2 : false;
  var fir = par>=4 && n>=2 ? shots[1].lie==="calle" : null;
  var putts = shots.filter(function(s){return s.lie==="green";}).length;
  var bunkerShot = shots.find(function(s){return s.lie==="bunker" && parseFloat(s.distanceToHole)<=25;});
  var inBunker = !!bunkerShot;
  var sandSave = inBunker ? n<=par : null;
  var sg = calcSG(shots, par, hL);
  var cats = {offTee:0,approach:0,aroundGreen:0,putting:0};
  sg.filter(function(s){return s.sg!==null;}).forEach(function(s){
    if (s.sgCat in cats) cats[s.sgCat]+=s.sg;
  });
  var sgTotal = sg.filter(function(s){return s.sg!==null;}).reduce(function(a,s){return a+s.sg;},0);
  // Scrambling: missed GIR but made par or better (only counts shots <=50m from green)
  var missedGIR = !gir && firstGreen>=0;
  var scrambled = missedGIR ? (n<=par) : null;
  // Confirm there was actually a shot <=50m before reaching green (proper scramble situation)
  var hadShortGame = shots.some(function(s,i){
    return i<firstGreen && parseFloat(s.distanceToHole)<=25 && s.lie!=="green";
  });
  if (missedGIR && !hadShortGame) scrambled = null; // no short game shot = not a scramble opp

  return {n:n,par:par,score:n-par,gir:gir,fir:fir,putts:putts,inBunker:inBunker,sandSave:sandSave,scrambled:scrambled,sg:sg,sgTotal:sgTotal,
    offTee:cats.offTee,approach:cats.approach,aroundGreen:cats.aroundGreen,putting:cats.putting};
}

function roundStats(round) {
  var hs = round.holes.map(holeStats).filter(Boolean);
  if (!hs.length) return null;
  var total=hs.reduce(function(a,h){return a+h.n;},0);
  var par=hs.reduce(function(a,h){return a+h.par;},0);
  var firH=hs.filter(function(h){return h.fir!==null;});
  var cats={offTee:0,approach:0,aroundGreen:0,putting:0};
  hs.forEach(function(h){Object.keys(cats).forEach(function(k){cats[k]+=h[k]||0;});});
  return Object.assign({
    totalStrokes:total, totalPar:par, score:total-par, holesPlayed:hs.length,
    girCount:hs.filter(function(h){return h.gir;}).length,
    girPct:hs.filter(function(h){return h.gir;}).length/hs.length*100,
    firCount:hs.filter(function(h){return h.fir;}).length, firTotal:firH.length,
    firPct:firH.length?hs.filter(function(h){return h.fir;}).length/firH.length*100:null,
    totalPutts:hs.reduce(function(a,h){return a+h.putts;},0),
    avgPutts:hs.reduce(function(a,h){return a+h.putts;},0),
    sandSaves:hs.filter(function(h){return h.sandSave===true;}).length,
    sandTotal:hs.filter(function(h){return h.sandSave!==null;}).length,
    scramblingMade:hs.filter(function(h){return h.scrambled===true;}).length,
    scramblingTotal:hs.filter(function(h){return h.scrambled!==null;}).length,
    scramblingPct:hs.filter(function(h){return h.scrambled!==null;}).length>0
      ? hs.filter(function(h){return h.scrambled===true;}).length/hs.filter(function(h){return h.scrambled!==null;}).length*100
      : null,
    sgTotal:hs.reduce(function(a,h){return a+h.sgTotal;},0),
  },cats);
}

// ─── STATS AGGREGATION ────────────────────────────────────────────────────────
function aggregateStats(rounds, hcp) {
  if (!rounds.length) return null;
  var rs = rounds.map(function(r){return {id:r.id,date:r.date,course:r.course,year:r.year,st:roundStats(r)};}).filter(function(x){return x.st;});
  if (!rs.length) return null;
  var n = rs.length;
  function avg(fn){ var v=rs.map(fn).filter(function(x){return x!==null&&!isNaN(x);}); return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:null; }
  var avgScore=avg(function(r){return r.st.score;});
  var avgSG=avg(function(r){return r.st.sgTotal;});
  var avgOT=avg(function(r){return r.st.offTee;});
  var avgApp=avg(function(r){return r.st.approach;});
  var avgATG=avg(function(r){return r.st.aroundGreen;});
  var avgPutt=avg(function(r){return r.st.putting;});
  var avgGIR=avg(function(r){return r.st.girPct;});
  var avgFIR=avg(function(r){return r.st.firPct;});
  var avgPutts=avg(function(r){return r.st.avgPutts;});

  // HCP-adjusted expected SG (how much below PGA Tour is expected at this hcp)
  var hcpAdj = null;
  if (hcp!==null && hcp!==undefined && !isNaN(hcp)) {
    // Broadie: scratch ~4.9 strokes/round below PGA Tour baseline total
    // Scale linearly: hcp 0=4.9, hcp 10=4.9*(1+10*0.18), hcp 18=4.9*(1+18*0.18)
    var totalDef = 4.9 + hcp*0.38;
    hcpAdj = {
      offTee:    -(totalDef*0.378),
      approach:  -(totalDef*0.296),
      aroundGreen:-(totalDef*0.235),
      putting:   -(totalDef*0.092),
      total:     -totalDef,
    };
  }

  // Club SG
  var clubMap = {};
  rounds.forEach(function(r){ r.holes.forEach(function(hole){
    var sg = calcSG(hole.shots, hole.par, hole.holeLength||null);
    sg.forEach(function(s){
      if (!s.club||s.sg===null) return;
      if (!clubMap[s.club]) clubMap[s.club]={sum:0,n:0};
      clubMap[s.club].sum+=s.sg; clubMap[s.club].n++;
    });
  });});
  var topClubs = Object.keys(clubMap).filter(function(c){return clubMap[c].n>=3;})
    .map(function(c){return {club:c,n:clubMap[c].n,avg:clubMap[c].sum/clubMap[c].n};})
    .sort(function(a,b){return b.avg-a.avg;});

  // Miss analysis
  var missAll={izquierda:0,derecha:0,largo:0,corto:0};
  rounds.forEach(function(r){ r.holes.forEach(function(hole){
    hole.shots.forEach(function(s){ if(s.miss&&missAll.hasOwnProperty(s.miss)) missAll[s.miss]++; });
  });});
  var missTotal=Object.values(missAll).reduce(function(a,b){return a+b;},0);
  var missTend = missTotal>3 ? Object.keys(missAll).reduce(function(a,b){return missAll[a]>missAll[b]?a:b;}) : null;

  // Approach zones: SG + proximidad al pin (distancia del siguiente golpe)
  var zones = APPROACH_ZONES.map(function(z){
    var sgVals=[], proxVals=[];
    rounds.forEach(function(r){ r.holes.forEach(function(hole){
      var sg=calcSG(hole.shots,hole.par,hole.holeLength||null);
      sg.forEach(function(s,idx){
        var d=parseFloat(s.distanceToHole);
        // Exclude: layup shots and par5 second shot (idx=1) from proximity
        var isPar5Second = hole.par===5 && idx===1;
        var isLayup = s.layup===true;
        if((s.sgCat==="approach"||s.sgCat==="aroundGreen")&&d>=z.min&&d<z.max&&s.sg!==null&&!isPar5Second&&!isLayup){
          sgVals.push(s.sg);
          // Proximidad = distancia del siguiente golpe (donde quedó la bola)
          // Skip if next shot is a penalty
          var next = hole.shots[idx+1];
          if(next&&!next.layup){ var prox=parseFloat(next.distanceToHole); if(!isNaN(prox)&&prox>=0) proxVals.push(prox); }
        }
      });
    });});
    var avgSG   = sgVals.length   ? sgVals.reduce(function(a,b){return a+b;},0)/sgVals.length : null;
    var avgProx = proxVals.length ? proxVals.reduce(function(a,b){return a+b;},0)/proxVals.length : null;
    var minProx = proxVals.length ? Math.min.apply(null,proxVals) : null;
    var maxProx = proxVals.length ? Math.max.apply(null,proxVals) : null;
    return {label:z.label, n:sgVals.length, avg:avgSG, proxN:proxVals.length, avgProx:avgProx, minProx:minProx, maxProx:maxProx};
  });


  var rec=[]; var totalShots=rounds.reduce(function(a,r){return a+r.holes.reduce(function(b,h){return b+h.shots.length+h.shots.reduce(function(cc,s){return cc+(s.penalty||0);},0);},0);},0);

  // Scrambling aggregate
  var scramblingRounds = rs.filter(function(r){return r.st.scramblingTotal>0;});
  var avgScrambling = scramblingRounds.length
    ? scramblingRounds.reduce(function(a,r){return a+r.st.scramblingPct;},0)/scramblingRounds.length
    : null;
  var totalScramblingMade  = rs.reduce(function(a,r){return a+(r.st.scramblingMade||0);},0);
  var totalScramblingTotal = rs.reduce(function(a,r){return a+(r.st.scramblingTotal||0);},0);

  // Sand saves aggregate
  var sandRounds = rs.filter(function(r){return r.st.sandTotal>0;});
  var avgSandSave = sandRounds.length
    ? rs.reduce(function(a,r){return a+(r.st.sandSaves||0);},0) /
      rs.reduce(function(a,r){return a+(r.st.sandTotal||0);},0) * 100
    : null;
  var totalSandSaves = rs.reduce(function(a,r){return a+(r.st.sandSaves||0);},0);
  var totalSandTotal = rs.reduce(function(a,r){return a+(r.st.sandTotal||0);},0);

  // SG evolution per round (for trend chart in PDF)
  var sgEvolution = rs.slice().reverse().map(function(r){
    return {date:r.date, course:r.course,
      sgTotal:parseFloat(r.st.sgTotal.toFixed(3)),
      offTee:parseFloat(r.st.offTee.toFixed(3)),
      approach:parseFloat(r.st.approach.toFixed(3)),
      aroundGreen:parseFloat(r.st.aroundGreen.toFixed(3)),
      putting:parseFloat(r.st.putting.toFixed(3)),
      score:r.st.score,
    };
  });

  return {rs:rs, n:n, avgScore:avgScore, avgSG:avgSG, avgOT:avgOT, avgApp:avgApp, avgATG:avgATG, avgPutt:avgPutt,
    avgGIR:avgGIR, avgFIR:avgFIR, avgPutts:avgPutts, avgPPH:avgPutts,
    topClubs:topClubs, missAll:missAll, missTotal:missTotal, missTend:missTend,
    zones:zones, hcpAdj:hcpAdj, totalShots:totalShots,
    avgScrambling:avgScrambling, totalScramblingMade:totalScramblingMade, totalScramblingTotal:totalScramblingTotal,
    avgSandSave:avgSandSave, totalSandSaves:totalSandSaves, totalSandTotal:totalSandTotal,
    sgEvolution:sgEvolution};
}

// ─── VOICE PARSER ─────────────────────────────────────────────────────────────
function parseVoice(text) {
  var t = text.toLowerCase().trim();
  // Normalize: remove accents for comparison
  var tn = t.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var result = {};

  // ── LIE ─────────────────────────────────────────────────────────────────────
  var lieMap = {
    tee:    ["tee","salida","te ","te$"],
    calle:  ["calle","fairway","feri","en calle"],
    rough:  ["rough","ruf","hierba","en el rough","en rough"],
    bunker: ["bunker","bun ker","arena","trampa","en bunker"],
    green:  ["green","grin","en el green","en green"],
  };
  // Check lies in order, using word boundary awareness
  var lieKeys = ["green","bunker","rough","calle","tee"];
  for (var li=0; li<lieKeys.length; li++) {
    var lie = lieKeys[li];
    var words = lieMap[lie];
    var found = false;
    for (var wi=0; wi<words.length; wi++) {
      if (tn.indexOf(words[wi].normalize("NFD").replace(/[\u0300-\u036f]/g,"")) >= 0) {
        found = true; break;
      }
    }
    if (found) { result.lie = lie; break; }
  }

  // ── DISTANCE ─────────────────────────────────────────────────────────────────
  // Match numbers: "trescientos ochenta" or "380" or "3.5" or "medio"
  var numWords = {
    "cero":0,"uno":1,"dos":2,"tres":3,"cuatro":4,"cinco":5,"seis":6,"siete":7,
    "ocho":8,"nueve":9,"diez":10,"once":11,"doce":12,"trece":13,"catorce":14,
    "quince":15,"dieciseis":16,"diecisiete":17,"dieciocho":18,"diecinueve":19,
    "veinte":20,"veintiuno":21,"veintidos":22,"veintitres":23,"veinticuatro":24,
    "veinticinco":25,"veintiseis":26,"veintisiete":27,"veintiocho":28,"veintinueve":29,
    "treinta":30,"cuarenta":40,"cincuenta":50,"sesenta":60,"setenta":70,
    "ochenta":80,"noventa":90,"cien":100,"ciento":100,
    "doscientos":200,"trescientos":300,"cuatrocientos":400,"quinientos":500,
  };
  if (tn.indexOf("medio") >= 0 || tn.indexOf("y medio") >= 0) {
    result.distanceToHole = "0.5";
  } else {
    // Try numeric first
    var dm = t.match(/(\d+[.,]\d+|\d+)/);
    if (dm) {
      var num = parseFloat(dm[1].replace(",","."));
      // Avoid picking up club numbers like "hierro 7" as distance
      // If number is 1-9 and we also have "hierro" nearby, skip
      var isClubNum = (num >= 1 && num <= 9) && 
        (tn.indexOf("hierro") >= 0 || tn.indexOf("madera") >= 0 || tn.indexOf("hibrido") >= 0);
      if (!isClubNum) {
        result.distanceToHole = dm[1].replace(",",".");
      }
    }
    // Try word numbers if no digit found
    if (!result.distanceToHole) {
      var tnNorm = tn;
      var dist = 0;
      // Sort by value descending to avoid "tres" matching before "trescientos"
      var numKeys = Object.keys(numWords).sort(function(a,b){return numWords[b]-numWords[a];});
      for (var ni=0; ni<numKeys.length; ni++) {
        var nk = numKeys[ni];
        if (tnNorm.indexOf(nk) >= 0) {
          dist += numWords[nk];
          tnNorm = tnNorm.replace(nk, "");
        }
      }
      if (dist > 0) result.distanceToHole = String(dist);
    }
  }

  // ── CLUB ─────────────────────────────────────────────────────────────────────
  // Order matters: check more specific patterns first
  // Use word boundaries by checking surrounding chars
  function hasWord(str, word) {
    var idx = str.indexOf(word);
    if (idx < 0) return false;
    var before = idx === 0 ? " " : str[idx-1];
    var after = idx+word.length >= str.length ? " " : str[idx+word.length];
    return /[\s,.]/.test(before) || idx===0 || /[\s,.]/.test(after) || idx+word.length===str.length;
  }

  var clubTests = [
    // Specific multi-word first
    ["Madera 3",  function(s){return s.indexOf("madera") >= 0;}],
    ["Híbrido 2", function(s){return (s.indexOf("hibrido") >= 0 || s.indexOf("hibrido") >= 0) && (s.indexOf("dos") >= 0 || s.indexOf(" 2") >= 0);}],
    ["Híbrido 3", function(s){return (s.indexOf("hibrido") >= 0) && (s.indexOf("tres") >= 0 || s.indexOf(" 3") >= 0) && s.indexOf("trescientos") < 0;}],
    ["Híbrido 4", function(s){return (s.indexOf("hibrido") >= 0) && (s.indexOf("cuatro") >= 0 || s.indexOf(" 4") >= 0);}],
    ["Hierro 4",  function(s){return s.indexOf("hierro") >= 0 && (s.indexOf("cuatro") >= 0 || / 4[ $]/.test(s) || s.indexOf(" 4") >= 0 && s.indexOf("cuatro") < 0 && (s.match(/ 4/) || [''])[0].length > 0);}],
    ["Hierro 5",  function(s){return s.indexOf("hierro") >= 0 && (s.indexOf("cinco") >= 0 || s.indexOf(" 5") >= 0);}],
    ["Hierro 6",  function(s){return s.indexOf("hierro") >= 0 && (s.indexOf("seis") >= 0 || s.indexOf(" 6") >= 0);}],
    ["Hierro 7",  function(s){return s.indexOf("hierro") >= 0 && (s.indexOf("siete") >= 0 || s.indexOf(" 7") >= 0);}],
    ["Hierro 8",  function(s){return s.indexOf("hierro") >= 0 && (s.indexOf("ocho") >= 0 || s.indexOf(" 8") >= 0);}],
    ["Hierro 9",  function(s){return s.indexOf("hierro") >= 0 && (s.indexOf("nueve") >= 0 || s.indexOf(" 9") >= 0);}],
    ["PW",        function(s){return s.indexOf("pitching") >= 0 || s.indexOf("pitch") >= 0 || s === "pw" || s.indexOf(" pw") >= 0 || s.indexOf("pw ") >= 0;}],
    ["54",        function(s){return s.indexOf("cincuenta y cuatro") >= 0 || s.indexOf("cincuenta cuatro") >= 0 || s.indexOf("54") >= 0 || (s.indexOf("cincuenta") >= 0 && s.indexOf("cuatro") >= 0);}],
    ["58",        function(s){return s.indexOf("cincuenta y ocho") >= 0 || s.indexOf("cincuenta ocho") >= 0 || s.indexOf("58") >= 0 || (s.indexOf("cincuenta") >= 0 && s.indexOf("ocho") >= 0);}],
    ["Putter",    function(s){return s.indexOf("putter") >= 0 || s.indexOf("puter") >= 0 || s.indexOf("putt") >= 0 || s.indexOf("pata") >= 0;}],
    // Driver last — most generic, avoid matching "drive" in irrelevant words
    ["Driver",    function(s){return s.indexOf("driver") >= 0 || s.indexOf("draiber") >= 0 || /\bdriver\b/.test(s) || s.endsWith("driver") || s.startsWith("driver");}],
  ];

  for (var ci=0; ci<clubTests.length; ci++) {
    if (clubTests[ci][1](tn)) {
      result.club = clubTests[ci][0];
      break;
    }
  }

  // ── MISS ─────────────────────────────────────────────────────────────────────
  if (t.indexOf("izquierda") >= 0 || tn.indexOf("izquierda") >= 0) result.miss = "izquierda";
  else if (t.indexOf("derecha") >= 0 || tn.indexOf("derecha") >= 0) result.miss = "derecha";
  else if (t.indexOf("largo") >= 0) result.miss = "largo";
  else if (t.indexOf("corto") >= 0) result.miss = "corto";

  return result;
}

        (z.minProx!==null&&z.maxProx!==null)?(z.maxProx-z.minProx).toFixed(1)+"m":"—"];
    });
    doc.autoTable({head:zHead,body:zBody,startY:y,
      headStyles:{fillColor:G,textColor:255,fontSize:8},
      bodyStyles:{fontSize:8,textColor:[40,40,40]},
      alternateRowStyles:{fillColor:[245,255,248]},
      margin:{left:14,right:14}});
    y=doc.lastAutoTable.finalY+8;
  }

  // ── Club SG ─────────────────────────────────────────────────────────────────
  if(stats.topClubs.length){
    y = checkPage(doc, y, 12);
    y = sectionTitle(doc, y, "SG por Palo (mín. 3 golpes)");
    var cHead=[["Palo","Golpes","SG Promedio"]];
    var cBody=stats.topClubs.map(function(cl){return [cl.club,cl.n,fmt(cl.avg,3)];});
    doc.autoTable({head:cHead,body:cBody,startY:y,
      headStyles:{fillColor:G,textColor:255,fontSize:8},
      bodyStyles:{fontSize:8},
      alternateRowStyles:{fillColor:[245,255,248]},
      margin:{left:14,right:110}});
    y=doc.lastAutoTable.finalY+8;
  }

  // ── Miss analysis ────────────────────────────────────────────────────────────
  if(stats.missTotal>0){
    y = checkPage(doc, y, 12);
    y = sectionTitle(doc, y, "Análisis de Fallos ("+stats.missTotal+" registrados)");
    var mHead=[["Dirección","Cantidad","%"]];
    var mBody=["izquierda","derecha","largo","corto"].map(function(m){
      var cnt=stats.missAll[m]||0;
      return [m.charAt(0).toUpperCase()+m.slice(1), cnt,
        stats.missTotal>0?Math.round(cnt/stats.missTotal*100)+"%":"—"];
    }).filter(function(r){return parseInt(r[1])>0;});
    if(stats.missTend) mBody.push(["→ Tendencia: "+stats.missTend,"",""]);
    doc.autoTable({head:mHead,body:mBody,startY:y,
      headStyles:{fillColor:G,textColor:255,fontSize:8},
      bodyStyles:{fontSize:8},
      alternateRowStyles:{fillColor:[245,255,248]},
      margin:{left:14,right:110}});
    y=doc.lastAutoTable.finalY+8;
  }

  // ── Full rounds history ──────────────────────────────────────────────────────
  y = checkPage(doc, y, 12);
  y = sectionTitle(doc, y, "Historial Completo de Rondas");
  var rHead=[["Fecha","Campo","Barras","Score","GIR","Calle%","Putts","Scramb.","Sand","SG"]];
  var rBody=stats.rs.map(function(r){var s=r.st;
    return [r.date.split("-").reverse().join("/"),
      r.course.length>18?r.course.slice(0,16)+"..":r.course,
      r.tee||"—",
      fmtScore(s.score),
      s.girCount+"/"+s.holesPlayed,
      s.firPct!==null?s.firPct.toFixed(0)+"%":"—",
      s.totalPutts,
      s.scramblingTotal>0?s.scramblingMade+"/"+s.scramblingTotal:"—",
      s.sandTotal>0?s.sandSaves+"/"+s.sandTotal:"—",
      fmt(s.sgTotal,2)];
  });
  doc.autoTable({head:rHead,body:rBody,startY:y,
    headStyles:{fillColor:G,textColor:255,fontSize:7},
    bodyStyles:{fontSize:7,textColor:[40,40,40]},
    alternateRowStyles:{fillColor:[245,255,248]},
    columnStyles:{0:{cellWidth:16},1:{cellWidth:30},2:{cellWidth:12}},
    margin:{left:14,right:14}});

  // ── Footer all pages ─────────────────────────────────────────────────────────
  // ── PÁGINA: MEDIAS POR HOYO — REAL GUADALHORCE ─────────────────────────────
  var TARGET_TEES   = ["Amarillas","Blancas"];
  var holeAvgData = {};
  TARGET_TEES.forEach(function(tee) {
    var teeRounds = allRounds.filter(function(r){
      return r.tee===tee;
    });
    if (!teeRounds.length) { holeAvgData[tee]=null; return; }
    var holeTotals=Array(18).fill(0), holeCounts=Array(18).fill(0), holePars=Array(18).fill(4);
    teeRounds.forEach(function(r){
      r.holes.forEach(function(hole,i){
        var pen=hole.shots.reduce(function(a,s){return a+(s.penalty||0);},0);
        var n=hole.shots.length+pen;
        if(n>0){holeTotals[i]+=n;holeCounts[i]++;if(hole.par)holePars[i]=hole.par;}
      });
    });
    holeAvgData[tee]={
      avgs:holeTotals.map(function(t,i){return holeCounts[i]>0?t/holeCounts[i]:null;}),
      pars:holePars, n:teeRounds.length
    };
  });
  var hasHoleData=TARGET_TEES.some(function(tee){return holeAvgData[tee]!==null;});
  if (hasHoleData) {
    doc.addPage();
    addPageHeader(doc, doc.internal.getNumberOfPages());
    var hy=24;
    hy=sectionTitle(doc,hy,"Media de Golpes por Hoyo");
    TARGET_TEES.forEach(function(tee){
      var data=holeAvgData[tee];
      if(!data) return;
      var teeColor=tee==="Amarillas"?[160,110,0]:tee==="Blancas"?[90,90,90]:[30,100,200];
      doc.setFont("helvetica","bold"); doc.setFontSize(8);
      doc.setTextColor(teeColor[0],teeColor[1],teeColor[2]);
      doc.text("Tee "+tee+" · "+data.n+" ronda"+(data.n>1?"s":""), 14, hy+4);
      hy+=8;
      var colW=10, rowH=7, startX=14;
      [0,9].forEach(function(offset){
        var holes9=[];
        for(var ii=0;ii<9;ii++) holes9.push(ii+offset);
        // Header row
        doc.setFillColor(G[0],G[1],G[2]);
        doc.rect(startX,hy,10,rowH,"F");
        doc.setFont("helvetica","bold"); doc.setFontSize(6);
        doc.setTextColor(255,255,255);
        doc.text("Hoyo",startX+5,hy+4.5,{align:"center"});
        holes9.forEach(function(hi,ci){
          var x=startX+10+ci*colW;
          doc.setFillColor(hi%2===1?230:240,hi%2===1?245:255,hi%2===1?234:244);
          doc.rect(x,hy,colW,rowH,"F");
          doc.setDrawColor(180,210,185); doc.rect(x,hy,colW,rowH,"S");
          doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
          doc.setTextColor(40,70,50);
          doc.text(String(hi+1),x+colW/2,hy+4.5,{align:"center"});
        });
        hy+=rowH;
        // Par row
        doc.setFillColor(220,245,228);
        doc.rect(startX,hy,10,rowH,"F");
        doc.setFont("helvetica","normal"); doc.setFontSize(6);
        doc.setTextColor(60,90,70);
        doc.text("Par",startX+5,hy+4.5,{align:"center"});
        holes9.forEach(function(hi,ci){
          var x=startX+10+ci*colW;
          doc.setFillColor(245,255,248); doc.rect(x,hy,colW,rowH,"F");
          doc.setDrawColor(180,210,185); doc.rect(x,hy,colW,rowH,"S");
          doc.setFont("helvetica","normal"); doc.setFontSize(6.5);
          doc.setTextColor(60,90,70);
          doc.text(String(data.pars[hi]),x+colW/2,hy+4.5,{align:"center"});
        });
        hy+=rowH;
        // Media row
        doc.setFillColor(220,245,228);
        doc.rect(startX,hy,10,rowH,"F");
        doc.setFont("helvetica","bold"); doc.setFontSize(6);
        doc.setTextColor(60,90,70);
        doc.text("Media",startX+5,hy+4.5,{align:"center"});
        holes9.forEach(function(hi,ci){
          var x=startX+10+ci*colW;
          var avg=data.avgs[hi];
          var diff=avg!==null?avg-data.pars[hi]:null;
          var bgR=245,bgG=255,bgB=248;
          if(diff!==null){
            if(diff<0){bgR=220;bgG=255;bgB=220;}
            else if(diff<=1){bgR=255;bgG=245;bgB=220;}
            else{bgR=255;bgG=225;bgB=225;}
          }
          doc.setFillColor(bgR,bgG,bgB); doc.rect(x,hy,colW,rowH,"F");
          doc.setDrawColor(180,210,185); doc.rect(x,hy,colW,rowH,"S");
          doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
          var dc=diff===null?[80,80,80]:diff<0?[20,120,40]:diff===0?[40,80,50]:[180,40,40];
          doc.setTextColor(dc[0],dc[1],dc[2]);
          doc.text(avg!==null?avg.toFixed(1):"—",x+colW/2,hy+4.5,{align:"center"});
        });
        hy+=rowH+3;
      });
      var totalAvg=data.avgs.reduce(function(a,v){return a+(v||0);},0);
      var totalPar=data.pars.reduce(function(a,v){return a+v;},0);
      var totalDiff=totalAvg-totalPar;
      doc.setFillColor(G[0],G[1],G[2]);
      doc.roundedRect(startX,hy,100,7,1,1,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(7);
      doc.setTextColor(255,255,255);
      doc.text("Total: "+totalAvg.toFixed(1)+" golpes  ("+(totalDiff>=0?"+":"")+totalDiff.toFixed(1)+" vs par "+totalPar+")",startX+3,hy+4.5);
      hy+=12;
    });
  }

    var pages=doc.internal.getNumberOfPages();
  for(var i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFillColor(DARK[0],DARK[1],DARK[2]); doc.rect(0,287,210,10,"F");
    doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.setTextColor(LG[0],LG[1],LG[2]);
    doc.text("Mi Golf App · "+new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"}),14,293);
    doc.text("Pág. "+i+" / "+pages,196,293,{align:"right"});
  }
  // ── PÁGINA: GRÁFICOS DE EVOLUCIÓN SG ────────────────────────────────────────
  if (stats.sgEvolution && stats.sgEvolution.length >= 1) {
    doc.addPage();
    addPageHeader(doc, doc.internal.getNumberOfPages());
    var gy = 24;
    gy = sectionTitle(doc, gy, "Evolución del SG por Categoría");

    var MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    var ev = stats.sgEvolution; // oldest first

    // Fixed Y scale: -5 to +2
    var Y_MIN = -5.0, Y_MAX = 2.0, Y_RANGE = Y_MAX - Y_MIN;
    var Y_TICKS = [-5,-4,-3,-2,-1,0,1,2];

    // Determine X axis range from filter
    var xStart, xEnd;
    if (filterMode==="range" && dateFrom && dateTo) {
      xStart = dateFrom.slice(0,7); // YYYY-MM
      xEnd   = dateTo.slice(0,7);
    } else if (filterMode==="year" && year!=="all") {
      xStart = year+"-01";
      xEnd   = year+"-12";
    } else {
      // all time: use first and last round dates
      xStart = ev[0].date.slice(0,7);
      xEnd   = ev[ev.length-1].date.slice(0,7);
    }
    // Build month list from xStart to xEnd
    function buildMonths(s, e) {
      var months = [];
      var sy = parseInt(s.slice(0,4)), sm = parseInt(s.slice(5,7));
      var ey = parseInt(e.slice(0,4)), em = parseInt(e.slice(5,7));
      var cy2 = sy, cm = sm;
      while (cy2 < ey || (cy2===ey && cm<=em)) {
        months.push({
          key: cy2+"-"+(cm<10?"0":"")+cm,
          label: MESES[cm-1]+" "+String(cy2).slice(2)
        });
        cm++; if (cm>12){cm=1;cy2++;}
      }
      return months;
    }
    var xMonths = buildMonths(xStart, xEnd);
    var nMonths = xMonths.length;

    var cats = [
      {key:"offTee",      label:"Off the Tee",    color:[22,101,52]},
      {key:"approach",    label:"Approach",        color:[30,100,200]},
      {key:"aroundGreen", label:"Around the Green",color:[180,90,20]},
      {key:"putting",     label:"Putting",         color:[140,20,140]},
    ];

    // Layout: 2 charts per row, 2 rows
    var chartW=88, chartH=55, marginX=12, gapX=12, gapY=10;
    // Left margin inside chart for Y labels, bottom margin for X labels
    var leftM=10, bottomM=8, topM=8, rightM=4;

    cats.forEach(function(cat, ci) {
      var col = ci % 2;
      var row = Math.floor(ci / 2);
      var cx  = marginX + col * (chartW + gapX);
      var cy  = gy + row * (chartH + gapY + 6);

      // Chart background
      doc.setFillColor(245,255,248);
      doc.rect(cx, cy, chartW, chartH, "F");
      doc.setDrawColor(160,200,170);
      doc.rect(cx, cy, chartW, chartH, "S");

      // Category title
      doc.setFont("helvetica","bold"); doc.setFontSize(7.5);
      doc.setTextColor(cat.color[0], cat.color[1], cat.color[2]);
      doc.text(cat.label, cx + chartW/2, cy + 5.5, {align:"center"});

      // Plot area
      var px = cx + leftM;   // left edge of plot (after Y labels)
      var py = cy + topM;    // top edge of plot
      var pw = chartW - leftM - rightM;  // plot width
      var ph = chartH - topM - bottomM; // plot height

      // Helper: convert SG value to Y pixel
      function sgToY(v) {
        return py + ph - ((v - Y_MIN) / Y_RANGE) * ph;
      }
      // Helper: convert month key to X pixel
      function monthToX(mKey) {
        var idx = xMonths.findIndex(function(m){return m.key===mKey;});
        if (idx < 0) return null;
        if (nMonths === 1) return px + pw/2;
        return px + (idx / (nMonths-1)) * pw;
      }

      // ── Y axis line
      doc.setDrawColor(80,100,85); doc.setLineWidth(0.4);
      doc.line(px, py, px, py+ph);

      // ── X axis line (at Y=0)
      var zeroY = sgToY(0);
      doc.setDrawColor(80,100,85); doc.setLineWidth(0.4);
      doc.line(px, zeroY, px+pw, zeroY);

      // ── Horizontal grid lines + Y labels
      Y_TICKS.forEach(function(tick) {
        var ty = sgToY(tick);
        if (ty < py-1 || ty > py+ph+1) return;
        // Grid line (light, except zero which is drawn above)
        if (tick !== 0) {
          doc.setDrawColor(200,230,210); doc.setLineWidth(0.15);
          doc.line(px, ty, px+pw, ty);
        }
        // Y label
        doc.setFont("helvetica","normal"); doc.setFontSize(4.5);
        doc.setTextColor(tick===0?50:100, tick===0?80:130, tick===0?60:100);
        var lbl = tick===0?"0":(tick>0?"+":"")+tick.toFixed(0);
        doc.text(lbl, px-1.5, ty+1.3, {align:"right"});
        // Tick mark on Y axis
        doc.setDrawColor(80,100,85); doc.setLineWidth(0.3);
        doc.line(px-1, ty, px, ty);
      });

      // ── X axis month labels + tick marks
      doc.setFont("helvetica","normal"); doc.setFontSize(4);
      doc.setTextColor(70,100,80);
      var labelEvery = nMonths <= 12 ? 1 : Math.ceil(nMonths/12);
      xMonths.forEach(function(m, mi) {
        if (mi % labelEvery !== 0 && mi !== nMonths-1) return;
        var mx = nMonths===1 ? px+pw/2 : px + (mi/(nMonths-1))*pw;
        // Tick mark
        doc.setDrawColor(80,100,85); doc.setLineWidth(0.3);
        doc.line(mx, zeroY, mx, zeroY+1.5);
        // Label below X axis
        doc.text(m.label, mx, py+ph+5.5, {align:"center"});
      });

      // ── Plot data points and lines
      var vals = ev.map(function(r){ return r[cat.key]; });
      var points = ev.map(function(r, i) {
        var mKey = r.date.slice(0,7);
        var mx = monthToX(mKey);
        // If month not in range, clamp to edges
        if (mx === null) mx = px + pw/2;
        // If multiple rounds same month, spread slightly
        var sameMonth = ev.filter(function(r2){return r2.date.slice(0,7)===mKey;});
        if (sameMonth.length > 1) {
          var idx2 = sameMonth.indexOf(r);
          var spread = Math.min(pw*0.03, 3);
          mx += (idx2 - (sameMonth.length-1)/2) * spread;
        }
        return {x: mx, y: sgToY(vals[i]), v: vals[i]};
      });

      // Lines between points
      if (points.length > 1) {
        doc.setDrawColor(cat.color[0], cat.color[1], cat.color[2]);
        doc.setLineWidth(0.7);
        for (var i=0; i<points.length-1; i++) {
          doc.line(points[i].x, points[i].y, points[i+1].x, points[i+1].y);
        }
      }

      // Dots + value labels
      points.forEach(function(pt) {
        var isPos = pt.v >= 0;
        var dc = isPos ? [22,101,52] : [200,50,50];
        doc.setFillColor(dc[0],dc[1],dc[2]);
        doc.setDrawColor(255,255,255); doc.setLineWidth(0.3);
        doc.circle(pt.x, pt.y, 1.3, "FD");
        // Value label
        doc.setFont("helvetica","bold"); doc.setFontSize(4.5);
        doc.setTextColor(dc[0],dc[1],dc[2]);
        var labelY = pt.y < py+8 ? pt.y+4 : pt.y-2.5;
        doc.text(pt.v.toFixed(2), pt.x, labelY, {align:"center"});
      });
    });
  }

  doc.save("mi-golf-informe.pdf");
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  var [rounds,   setRounds]   = useState([]);
  var [loaded,   setLoaded]   = useState(false);
  var [view,     setView]     = useState("home");
  var [activeId, setActiveId] = useState(null);
  var [holeIdx,  setHoleIdx]  = useState(0);
  var [form,     setForm]     = useState({lie:"",distanceToHole:"",club:"",miss:"",penalty:0,layup:false});
  var [editIdx,  setEditIdx]  = useState(null);
  var [showModal,setShowModal]= useState(false);
  var [course,   setCourse]   = useState("");
  var [rDate,    setRDate]    = useState(new Date().toISOString().slice(0,10));
  var [year,     setYear]     = useState("all");
  var [dateFrom, setDateFrom] = useState("");
  var [dateTo,   setDateTo]   = useState("");
  var [filterMode,setFilterMode]=useState("year");
  var [tab,      setTab]      = useState("general");
  var [vState,   setVState]   = useState("idle");
  var [vText,    setVText]    = useState("");
  var [hcp,      setHcp]      = useState(null);
  var [showHcp,  setShowHcp]  = useState(false);
  var [courses,  setCourses]  = useState([]);      // saved course cards
  var [selCourse,setSelCourse]= useState(null);    // selected course object {name, tees:[{color,holes:[{par,dist}]}]}
  var [selTee,   setSelTee]   = useState(null);    // selected tee color
  var [showCourseEditor, setShowCourseEditor] = useState(false); // editing new course card
  var [editCourse, setEditCourse] = useState(null); // course being edited
  var [editTeeIdx, setEditTeeIdx] = useState(0);    // active tee tab in editor

  var roundsRef = useRef([]);
  var coursesRef = useRef([]);

  // Storage
  useEffect(function(){
    try{
      var s=localStorage.getItem(STORAGE_KEY); if(s){var d=JSON.parse(s);setRounds(d);roundsRef.current=d;}
      var h=localStorage.getItem("golf-hcp"); if(h!==null) setHcp(parseFloat(h)||null);
      var cs=localStorage.getItem("golf-courses"); if(cs){var cd=JSON.parse(cs);setCourses(cd);coursesRef.current=cd;}
      var nav=localStorage.getItem("golf-nav");
      if(nav){
        var nd=JSON.parse(nav);
        // Only restore if the round still exists
        var rounds2=roundsRef.current;
        if(nd.activeId && rounds2.find(function(r){return r.id===nd.activeId;})){
          setActiveId(nd.activeId);
          setHoleIdx(nd.holeIdx||0);
          setView("round");
        }
      }
    }catch(e){}
    setLoaded(true);
  },[]);
  function save(r){setRounds(r);roundsRef.current=r;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(r));}catch(e){}}
  function saveNavState(id, idx){try{localStorage.setItem("golf-nav",JSON.stringify({activeId:id,holeIdx:idx,view:"round"}));}catch(e){}}
  function clearNavState(){try{localStorage.removeItem("golf-nav");}catch(e){}}
  function saveHcp(v){
    setHcp(v);
    try{
      if(v===null||v===undefined||v==="") localStorage.removeItem("golf-hcp");
      else localStorage.setItem("golf-hcp",String(v));
    }catch(e){}
  }
  function saveCourses(cs){setCourses(cs);coursesRef.current=cs;try{localStorage.setItem("golf-courses",JSON.stringify(cs));}catch(e){}}
  function deleteCourse(name){saveCourses(coursesRef.current.filter(function(c){return c.name!==name;}));}


  var activeRound = rounds.find(function(r){return r.id===activeId;});
  var hole = activeRound ? activeRound.holes[holeIdx] : null;
  var shots = hole ? hole.shots : [];

  function updateHole(idx, fn){ save(roundsRef.current.map(function(r){if(r.id!==activeId)return r;var h=r.holes.slice();h[idx]=fn(h[idx]);return Object.assign({},r,{holes:h});})); }
  function addRound(){
    var name = selCourse ? selCourse.name : course.trim();
    if(!name) return;
    var teeData = selCourse && selTee ? selCourse.tees.find(function(t){return t.color===selTee;}) : null;
    var id=Date.now()+"";
    var holes=Array.from({length:18},function(_,i){
      var hd=teeData&&teeData.holes[i];
      return {hole:i+1,par:hd?hd.par:4,holeLength:hd?hd.dist:null,shots:[]};
    });
    var nr={id:id,course:name,date:rDate,year:parseInt(rDate.slice(0,4)),tee:selTee||null,holes:holes};
    save([nr].concat(roundsRef.current));
    setActiveId(id);setHoleIdx(0);setEditIdx(null);
    // Pre-fill first hole if par4/5 with known length
    var h0=holes[0];
    var autoD0=(h0&&h0.par>=4&&h0.holeLength)?String(h0.holeLength):"";
    setForm({lie:autoD0?"tee":"",distanceToHole:autoD0,club:"",miss:""});
    setShowModal(false);setCourse("");setSelCourse(null);setSelTee(null);
    saveNavState(id, 0);
    setView("round");
  }
  function deleteRound(id){save(roundsRef.current.filter(function(r){return r.id!==id;}));}

  function exportBackup(){
    var data={
      version:"golf-v6",
      exportDate:new Date().toISOString(),
      rounds:roundsRef.current,
      courses:coursesRef.current,
      hcp:hcp,
    };
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json;charset=utf-8"});
    var a=document.createElement("a");
    var url=URL.createObjectURL(blob);
    a.href=url;
    a.download="mi-golf-backup-"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }

  function importBackup(file){
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var data=JSON.parse(e.target.result);
        if(!data.rounds||!Array.isArray(data.rounds)){
          alert("Archivo no válido. Debe ser una copia de seguridad de Mi Golf.");
          return;

              // ── GENERAL TAB
              tab==="general"&&h("div",{className:"fi"},
                h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7,marginBottom:14}},
                  h(KPI,{val:stats.avgScore!==null?(stats.avgScore>=0?"+":"")+stats.avgScore.toFixed(1):"—",label:"Score",col:stats.avgScore<0?"#4ade80":stats.avgScore===0?"#86efac":"#f87171",icon:"🏌️"}),
                  h(KPI,{val:stats.avgGIR!==null?stats.avgGIR.toFixed(1)+"%":"—",label:"GIR%",icon:"🎯"}),
                  h(KPI,{val:stats.avgPutts!==null?stats.avgPutts.toFixed(1):"—",label:"Putts",icon:"⬤"}),
                  h(KPI,{val:fmt(stats.avgSG,2),label:"SG Total",col:sgCol(stats.avgSG),icon:"📊"})
                ),
                h("div",{style:Object.assign({},C.card,{marginBottom:10})},
                  h("span",{style:C.lbl},"Estadísticas de ronda"),
                  h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
                    [
                      ["Rondas jugadas", stats.n],
                      ["Media golpes", stats.rs.length>0?(stats.totalShots/stats.rs.length).toFixed(1):"—"],
                      ["GIR promedio", stats.avgGIR!==null?stats.avgGIR.toFixed(1)+"%":"—"],
                      ["Fairways (%)", stats.avgFIR!==null?stats.avgFIR.toFixed(1)+"%":"—"],
                      ["Media putts", stats.avgPutts!==null?stats.avgPutts.toFixed(1):"—"],
                      ["Scrambling", stats.avgScrambling!==null?stats.avgScrambling.toFixed(1)+"%  ("+stats.totalScramblingMade+"/"+stats.totalScramblingTotal+")":"—"],
                      ["Sand saves", stats.avgSandSave!==null?stats.avgSandSave.toFixed(1)+"%  ("+stats.totalSandSaves+"/"+stats.totalSandTotal+")":"—"],
                      ["Mejor score", (function(){var best=stats.rs.reduce(function(b,r){return r.st.score<b?r.st.score:b;},999);if(best===999)return "—";var bestR=stats.rs.find(function(r){return r.st&&r.st.score===best;});return bestR&&bestR.st?String(bestR.st.totalStrokes):"—";})()],
                    ].map(function(row){return h("div",{key:row[0],style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #0d1f10"}},h("span",{style:{fontSize:11,color:"#4b7a56"}},(row[0])),h("span",{style:{fontSize:12,fontWeight:700,color:"#bbf7d0"}},(row[1])));})
                  )
                ),
                // Recent rounds table
                h("span",{style:C.lbl},"Últimas rondas"),
                stats.rs.slice(0,10).map(function(r){
                  var s=r.st; var d=s.score;
                  return h("div",{key:r.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 11px",marginBottom:5,background:"#0a1a0c",borderRadius:9,border:"1px solid #0d2010"}},
                    h("div",null,
                      h("div",{style:{fontSize:12,fontWeight:600,color:"#bbf7d0"}},r.course.length>22?r.course.slice(0,20)+"..":r.course),
                      h("div",{style:{fontSize:10,color:"#2d5535"}},r.date)
                    ),
                    h("div",{style:{display:"flex",gap:10}},
                      h("span",{style:{fontSize:13,fontWeight:700,color:d<0?"#4ade80":d===0?"#86efac":"#f87171"}},fmtScore(d)),
                      h("span",{style:{fontSize:11,color:"#4b7a56"}},"GIR "+s.girCount+"/"+s.holesPlayed),
                      h("span",{style:{fontSize:11,fontWeight:700,color:sgCol(s.sgTotal)}},fmt(s.sgTotal,1))
                    )
                  );
                })
              ),

              // ── SG TAB
              tab==="sg"&&h("div",{className:"fi"},
                h("div",{style:{padding:"9px 12px",marginBottom:12,background:"#080f09",borderRadius:9,border:"1px solid #0d2010",fontSize:10,color:"#4b7a56",lineHeight:1.6}},
                  "SG: tus strokes ganados/perdidos vs PGA Tour. ",
                  stats.hcpAdj
                    ? h("span",null,"Ref hcp: lo esperado para un jugador de handicap ",h("span",{style:{color:"#4ade80",fontWeight:700}},hcp),".")
                    : h("span",null,"Pulsa ",h("span",{style:{color:"#4ade80"}},"Hcp")," para ver el ref de tu nivel.")
                ),
                h("div",{style:{padding:"8px 11px",marginBottom:12,background:"#080f09",borderRadius:9,border:"1px solid #0d2010",fontSize:9,color:"#2d5535",lineHeight:1.6}},
                  "ℹ️ El SG Putting y el SG del Putter en la pestaña Palos pueden diferir si algún golpe desde green no tiene palo registrado, o porque uno promedia por ronda y el otro por golpe."
                ),
                [
                  {k:"avgOT",  label:"Off the Tee",  emoji:"🏌️", exp:stats.hcpAdj?stats.hcpAdj.offTee:0},
                  {k:"avgApp", label:"Approach",     emoji:"🎯",  exp:stats.hcpAdj?stats.hcpAdj.approach:0},
                  {k:"avgATG", label:"Juego corto",  emoji:"🔁",  exp:stats.hcpAdj?stats.hcpAdj.aroundGreen:0},
                  {k:"avgPutt",label:"Putting",      emoji:"⬤",  exp:stats.hcpAdj?stats.hcpAdj.putting:0},
                ].map(function(cat){
                  var v=stats[cat.k]; var exp=cat.exp; var gap=v!==null?(v-exp):null;
                  return h("div",{key:cat.k,style:Object.assign({},C.card,{marginBottom:9})},
                    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
                      h("span",{style:{fontSize:13,color:"#bbf7d0"}},(cat.emoji)+" "+(cat.label)),
                      h("div",{style:{textAlign:"right"}},
                        // SG = dato principal grande
                        h("div",{style:{fontSize:22,fontWeight:700,color:sgCol(v)}},fmt(v,3)),
                        // Gap vs hcp
                        stats.hcpAdj&&exp!==0&&v!==null&&!isNaN(v)&&(function(){
                          var gap=parseFloat((v-exp).toFixed(2));
                          var sign=gap>0?"+":"";
                          return h("div",{style:{fontSize:9,fontWeight:600,
                            color:gap>0?"#4ade80":"#f87171",marginTop:2}},
                            (gap>0?"↑ ":"↓ ")+sign+gap+" vs hcp");
                        })()
                      )
                    ),
                    h(SBar,{value:v||0,max:2})
                  );
                }),
                h("div",{style:Object.assign({},C.card,{marginTop:4})},
                  h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
                    h("span",{style:{fontSize:13,color:"#bbf7d0"}},"📊 SG Total"),
                    h("div",{style:{textAlign:"right"}},
                      h("div",{style:{fontSize:22,fontWeight:700,color:sgCol(stats.avgSG)}},fmt(stats.avgSG,3)),
                      stats.hcpAdj&&stats.avgSG!==null&&!isNaN(stats.avgSG)&&(function(){
                        var gap=parseFloat((stats.avgSG-stats.hcpAdj.total).toFixed(2));
                        var sign=gap>0?"+":"";
                        return h("div",{style:{fontSize:9,fontWeight:600,
                          color:gap>0?"#4ade80":"#f87171",marginTop:2}},
                          (gap>0?"↑ ":"↓ ")+sign+gap+" vs hcp");
                      })()
                    )
                  ),
                  h(SBar,{value:stats.avgSG||0,max:2})
                )
              ),

              // ── APPROACH TAB
              tab==="approach"&&h("div",{className:"fi"},
                h("span",{style:C.lbl},"Approach · SG y Proximidad al Pin"),
                h("div",{style:{fontSize:9,color:"#2d5535",marginBottom:10,padding:"6px 10px",
                  background:"#080f09",borderRadius:7,border:"1px solid #0d2010"}},
                  "SG medio por golpe en cada zona de distancia"
                ),
                h("div",{style:{fontSize:11,color:"#4b7a56",marginBottom:14,lineHeight:1.6}},
                  "Por cada zona de distancia: SG ganado/perdido y a cuántos metros queda la bola del hoyo tras el golpe."
                ),
                stats.zones.map(function(z){
                  var hasData = z.n>0;
                  var hasProx = z.proxN>0;
                  return h("div",{key:z.label,style:Object.assign({},C.card,{marginBottom:9,opacity:hasData?1:0.45})},
                    // Zone header
                    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:hasData?10:0}},
                      h("div",null,
                        h("div",{style:{fontSize:14,fontWeight:700,color:"#bbf7d0"}},z.label),
                        h("div",{style:{fontSize:9,color:"#2d5535",marginTop:2}},z.n+" golpe"+(z.n!==1?"s":"")+(hasProx?" · "+z.proxN+" con proximidad":""))
                      ),
                      hasData&&h("div",{style:{display:"flex",gap:12,alignItems:"center"}},
                        // SG badge
                        h("div",{style:{textAlign:"center",background:"#080f09",borderRadius:8,padding:"6px 10px",border:"1px solid #0d2010"}},
                          h("div",{style:{fontSize:16,fontWeight:700,color:sgCol(z.avg)}},fmt(z.avg,3)),
                          h("div",{style:{fontSize:8,color:"#2d5535",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:1}},"SG")
                        ),
                        // Proximity badge
                        hasProx
                          ? h("div",{style:{textAlign:"center",background:"#080f09",borderRadius:8,padding:"6px 10px",border:"1px solid #0d2010"}},
                              h("div",{style:{fontSize:16,fontWeight:700,color:"#fbbf24"}},z.avgProx.toFixed(1)+"m"),
                              h("div",{style:{fontSize:8,color:"#2d5535",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:1}},"Al pin")
                            )
                          : h("div",{style:{textAlign:"center",background:"#080f09",borderRadius:8,padding:"6px 10px",border:"1px solid #0d2010"}},
                              h("div",{style:{fontSize:14,color:"#1e4025"}},"—"),
                              h("div",{style:{fontSize:8,color:"#1e4025",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:1}},"Al pin")
                            )
                      )
                    ),
                    // Detail row: SG bar + prox range
                    hasData&&h("div",null,
                      h(SBar,{value:z.avg||0,max:0.8}),
                      hasProx&&z.proxN>1&&h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:7,padding:"6px 9px",background:"#080f09",borderRadius:7}},
                        h("div",{style:{textAlign:"center"}},
                          h("div",{style:{fontSize:11,fontWeight:700,color:"#4ade80"}},z.minProx.toFixed(1)+"m"),
                          h("div",{style:{fontSize:8,color:"#2d5535",textTransform:"uppercase",letterSpacing:"0.1em"}},"Mejor")
                        ),
                        h("div",{style:{textAlign:"center",alignSelf:"center"}},
                          h("div",{style:{fontSize:9,color:"#2d5535"}},"Dispersión"),
                          h("div",{style:{fontSize:10,color:"#4b7a56",marginTop:1}},(z.maxProx-z.minProx).toFixed(1)+"m")
                        ),
                        h("div",{style:{textAlign:"center"}},
                          h("div",{style:{fontSize:11,fontWeight:700,color:"#f87171"}},z.maxProx.toFixed(1)+"m"),
                          h("div",{style:{fontSize:8,color:"#2d5535",textTransform:"uppercase",letterSpacing:"0.1em"}},"Peor")
                        )
                      )
                    )
                  );
                }),
                h("div",{style:{padding:"10px 12px",background:"#080f09",borderRadius:10,border:"1px solid #0d2010",marginTop:4,fontSize:10,color:"#4b7a56",lineHeight:1.7}},
                  "La proximidad se calcula automáticamente como la distancia del siguiente golpe tras el approach. Para verla necesitas registrar el golpe siguiente (lie + distancia desde donde quedó la bola)."
                )
              ),

              // ── CLUBS TAB
              tab==="clubs"&&h("div",{className:"fi"},
                h("div",{style:{fontSize:9,color:"#2d5535",marginBottom:10,padding:"6px 10px",
                  background:"#080f09",borderRadius:7,border:"1px solid #0d2010"}},
                  "SG medio por golpe con cada palo (mín. 3 golpes registrados)"
                ),
                stats.topClubs.length===0
                  ? h("div",{style:{textAlign:"center",padding:"30px 0",color:"#1e4025",fontSize:12}},"Necesitas más golpes registrados (mín. 3 por palo)")
                  : h("div",null,
                      h("span",{style:C.lbl},"SG por palo (mín. 3 golpes)"),
                      stats.topClubs.map(function(cl,i){
                        return h("div",{key:cl.club,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",marginBottom:5,background:"#0a1a0c",borderRadius:10,border:"1px solid #0d2010"}},
                          h("div",{style:{width:22,height:22,borderRadius:"50%",background:"#142818",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:i<3?"#fbbf24":"#2d5535",fontWeight:700,flexShrink:0}},i+1),
                          h("div",{style:{flex:1}},
                            h("div",{style:{fontSize:13,fontWeight:600,color:"#bbf7d0"}},cl.club),
                            h("div",{style:{fontSize:9,color:"#2d5535"}},cl.n+" golpes")
                          ),
                          h("div",{style:{textAlign:"right"}},
                            h("div",{style:{fontSize:16,fontWeight:700,color:sgCol(cl.avg)}},fmt(cl.avg,3)),
                            h(SBar,{value:cl.avg||0,max:0.5})
                          )
                        );
                      })
                    )
              ),

              // ── MISSES TAB
              tab==="misses"&&h("div",{className:"fi"},
                stats.missTotal===0
                  ? h("div",{style:{textAlign:"center",padding:"30px 0",color:"#1e4025",fontSize:12}},"No hay datos de fallos registrados")
                  : h("div",null,
                      h("span",{style:C.lbl},"Análisis de fallos ("+stats.missTotal+" totales)"),
                      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}},
                        MISS_OPTS.map(function(mo){
                          var cnt=stats.missAll[mo.id]||0;
                          var pct=stats.missTotal>0?Math.round(cnt/stats.missTotal*100):0;
                          var icon=mo.id==="izquierda"?"◀":mo.id==="derecha"?"▶":mo.id==="largo"?"▲":"▼";
                          var name=mo.id==="izquierda"?"Izquierda":mo.id==="derecha"?"Derecha":mo.id==="largo"?"Largo":"Corto";
                          return h("div",{key:mo.id,style:{background:"#0a1a0c",borderRadius:11,padding:"12px 10px",textAlign:"center",border:"1px solid #0d2010"}},
                            h("div",{style:{fontSize:26,marginBottom:4,color:mo.col}},icon),
                            h("div",{style:{fontSize:18,fontWeight:700,color:mo.col}},cnt),
                            h("div",{style:{fontSize:10,color:"#2d5535"}},pct+"%"),
                            h("div",{style:{fontSize:9,color:"#1a3d20",marginTop:2,textTransform:"uppercase",letterSpacing:"0.1em"}},name)
                          );
                        })
                      ),
                      stats.missTend&&h("div",{style:{padding:"10px 14px",background:"#080f09",borderRadius:10,border:"1px solid #0d2010"}},
                        h("span",{style:{fontSize:10,color:"#4b7a56",textTransform:"uppercase",letterSpacing:"0.15em"}},"Tendencia predominante: "),
                        h("span",{style:{fontSize:16,fontWeight:700,color:"#fbbf24"}},
                          stats.missTend==="izquierda"?"◀ Izquierda":
                          stats.missTend==="derecha"?"▶ Derecha":
                          stats.missTend==="largo"?"▲ Largo":"▼ Corto"
                        )
                      )
                    )
              ),

            )
      )
    ),

    // ── BOTTOM NAV
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0a1a0e",borderTop:"1px solid #1a3d20",display:"flex",padding:"6px 10px",paddingBottom:"max(6px,env(safe-area-inset-bottom))",zIndex:40}},
      [["home","🏠","Inicio"],["round","⛳","Ronda"],["stats","📊","Stats"]].map(function(item){
        var id=item[0],icon=item[1],lbl=item[2];
        var isActive=view===id;
        return h("button",{key:id,onClick:function(){if(id==="round"&&!activeRound){setShowModal(true);return;}setView(id);},style:{flex:1,padding:"8px 0",border:"none",borderRadius:9,fontFamily:"Georgia,serif",cursor:"pointer",fontSize:11,background:isActive?"linear-gradient(135deg,#166534,#15803d)":"transparent",color:isActive?"#bbf7d0":"#4b7a56",fontWeight:isActive?700:400,touchAction:"manipulation",display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
          h("span",{style:{fontSize:17}},icon), h("span",null,lbl)
        );
      })
    )
  );
}

(function(){
  var rootEl = document.getElementById("root");
  if (ReactDOM.createRoot) {
    ReactDOM.createRoot(rootEl).render(React.createElement(App));
  } else {
    ReactDOM.render(React.createElement(App), rootEl);
  }
})();


</script>
</body>
</html>
